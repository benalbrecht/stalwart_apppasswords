<roundcube:include file="includes/layout.html" />
<roundcube:include file="includes/menu.html" />
<roundcube:include file="includes/settings-menu.html" />

<h1 class="voice"><roundcube:label name="settings" /> : <roundcube:label name="stalwart_apppasswords.apppasswords" /></h1>

<!-- app passwords list -->
<div id="layout-list" class="listbox selected" aria-labelledby="aria-label-apppasswordslist">
    <div class="header">
        <a class="button icon back-sidebar-button" href="#sidebar"><span class="inner"><roundcube:label name="settings" /></span></a>
        <span id="aria-label-apppasswordslist" class="header-title"><roundcube:label name="stalwart_apppasswords.apppasswords" /></span>
        <a class="button icon toolbar-menu-button" href="#list-menu"><span class="inner"><roundcube:label name="menu" /></span></a>
    </div>
    <div class="scroller">
        <roundcube:object name="apppasswordslist" id="apppasswords-table" class="listing"
            noheader="true" role="listbox" data-list="apppasswords_list"
            data-label-msg="stalwart_apppasswords.no_passwords" data-label-ext="stalwart_apppasswords.no_passwords_hint" data-create-command="plugin.stalwart_apppasswords-add" />
    </div>
    <div class="footer"></div>
</div>

<!-- content frame -->
<div id="layout-content" role="main">
    <h2 id="aria-label-toolbar" class="voice"><roundcube:label name="arialabeltoolbar" /></h2>
    <div class="header" role="toolbar" aria-labelledby="aria-label-toolbar">
        <a class="button icon back-list-button" href="#back"><span class="inner"><roundcube:label name="back" /></span></a>
        <span class="header-title"></span>
        <!-- toolbar -->
        <div id="apppasswordstoolbar" class="toolbar menu">
            <roundcube:button command="plugin.stalwart_apppasswords-add" type="link" class="create disabled" classAct="create"
                label="create" title="stalwart_apppasswords.create_password" innerClass="inner" data-fab="true" />
            <roundcube:button command="plugin.stalwart_apppasswords-delete" type="link" class="delete disabled" classAct="delete"
                label="delete" title="delete" innerClass="inner" />
        </div>
    </div>
    <div class="iframe-wrapper">
        <roundcube:object name="contentframe" id="apppasswords-frame" src="env:blankpage" title="stalwart_apppasswords.apppasswords" />
    </div>
</div>

<roundcube:include file="includes/footer.html" />
